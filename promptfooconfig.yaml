# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent System 完整测试套件"

# ── 被测系统 ──
providers:
  - id: 'python:scripts/promptfoo_provider.py'
    label: multi_agent
    config:
      entrypoint: agent

# ── 输入模板 ──
prompts:
  - "{{user_input}}"

# ── 默认配置 ──
defaultTest:
  options:
    timeout: 60000
  assert:
    - type: latency
      threshold: 30000

# ── 测试用例 ──
tests:
  # ============================================================
  # E2E 场景测试
  # ============================================================
  - description: "E2E - 自我介绍"
    vars:
      user_input: "My name is Alice"
    assert:
      - type: contains
        value: "Alice"

  - description: "E2E - 喜好"
    vars:
      user_input: "I like banana"
    assert:
      - type: contains
        value: "banana"

  - description: "E2E - 安排会议"
    vars:
      user_input: "提醒我明天下午四点开研发研讨会"
    assert:
      - type: contains
        value: "研发研讨会"

  - description: "E2E - 会议冲突"
    vars:
      user_input: "我的5点钟被schedule了另一个会议来讨论金融问题，这两个会议冲突了，我需要把5点钟的研发研讨会议取消掉"
    assert:
      - type: contains
        value: "金融会议"
      - type: contains
        value: "研发研讨会"

  - description: "E2E - 多任务并行"
    vars:
      user_input: "查看天气，并且记录笔记：明天下午三点开会，并且我叫张三"
    assert:
      - type: contains
        value: "天气"
      - type: contains
        value: "张三"

  - description: "E2E - 删除笔记需要用户确认"
    vars:
      user_input: "删除所有笔记"
    assert:
      - type: contains
        value: "确认"
